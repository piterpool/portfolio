<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Plans</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .finance-wrap { max-width: 720px; margin: 0 auto; padding: 24px; font-family: sans-serif; }
        #dashboard .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #dashboard .topbar .links a { margin-right: 14px; font-size: 14px; }
        #dashboard button.logout { padding: 6px 14px; cursor: pointer; }
        .chart-box { max-width: 640px; margin: 0 auto 32px; }
        table.finance-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        table.finance-table th, table.finance-table td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; font-size: 14px; }
        table.finance-table th { background: #f5f5f5; }
        .empty-note { color: #777; }
    </style>
</head>
<body>

    <div id="dashboard" class="finance-wrap">
        <div class="topbar">
            <h1>Plans</h1>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="admin.html">&larr; Admin</a>
                <button class="logout" id="logoutBtn">Log out</button>
            </div>
        </div>
        <div id="dataArea"><p class="empty-note">Checking session...</p></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
    <script>
        const DATA_ENDPOINT = '/api/plans-data';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = 'admin.html';
        });

        async function init() {
            try {
                const sessionRes = await fetch('/api/auth/session');
                const sessionData = await sessionRes.json();
                if (!sessionRes.ok || !sessionData.ok) {
                    window.location.href = 'admin.html';
                    return;
                }
            } catch {
                window.location.href = 'admin.html';
                return;
            }
            await loadData();
        }

        async function loadData() {
            const dataArea = document.getElementById('dataArea');
            dataArea.innerHTML = '<p class="empty-note">Loading...</p>';
            try {
                const res = await fetch(DATA_ENDPOINT);
                const data = await res.json();
                if (res.status === 401) {
                    window.location.href = 'admin.html';
                    return;
                }
                if (!res.ok) throw new Error(data.error || 'Could not load data.');
                renderDashboard(data.rows || []);
            } catch (err) {
                dataArea.innerHTML = '<p class="empty-note">' + (err.message || String(err)) + '</p>';
            }
        }

        function findColumn(headers, candidates) {
            return headers.find((h) => candidates.includes(h.trim().toLowerCase()));
        }

        function renderDashboard(rows) {
            const dataArea = document.getElementById('dataArea');
            dataArea.innerHTML = '';

            if (!rows.length) {
                dataArea.innerHTML = '<p class="empty-note">No rows found in the sheet yet. Add a "Plans" tab to your Google Sheet.</p>';
                return;
            }

            const headers = Object.keys(rows[0]);
            const dateCol = findColumn(headers, ['date', 'month', 'period']);
            const numericCols = headers.filter((h) => h !== dateCol && rows.some((r) => !isNaN(parseFloat(String(r[h]).replace(/[^0-9.\-]/g, '')))));
            const categoryCol = findColumn(headers, ['category', 'type']);
            const amountCol = findColumn(headers, ['amount', 'value', 'total']);

            // Trend line chart
            if (dateCol && numericCols.length) {
                const box = document.createElement('div');
                box.className = 'chart-box';
                const canvas = document.createElement('canvas');
                box.appendChild(canvas);
                dataArea.appendChild(box);

                new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: rows.map((r) => r[dateCol]),
                        datasets: numericCols.slice(0, 4).map((col, i) => ({
                            label: col,
                            data: rows.map((r) => parseFloat(String(r[col]).replace(/[^0-9.\-]/g, '')) || 0),
                            tension: 0.25,
                        })),
                    },
                    options: { responsive: true, plugins: { legend: { display: numericCols.length > 1 } } },
                });
            }

            // Category breakdown pie chart
            if (categoryCol && amountCol) {
                const totals = {};
                rows.forEach((r) => {
                    const cat = r[categoryCol] || 'Other';
                    const amt = parseFloat(String(r[amountCol]).replace(/[^0-9.\-]/g, '')) || 0;
                    totals[cat] = (totals[cat] || 0) + amt;
                });
                const box = document.createElement('div');
                box.className = 'chart-box';
                const canvas = document.createElement('canvas');
                box.appendChild(canvas);
                dataArea.appendChild(box);

                new Chart(canvas, {
                    type: 'pie',
                    data: {
                        labels: Object.keys(totals),
                        datasets: [{ data: Object.values(totals) }],
                    },
                    options: { responsive: true },
                });
            }

            // Raw data table
            const table = document.createElement('table');
            table.className = 'finance-table';
            const thead = document.createElement('thead');
            thead.innerHTML = '<tr>' + headers.map((h) => `<th>${h}</th>`).join('') + '</tr>';
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            rows.forEach((r) => {
                const tr = document.createElement('tr');
                tr.innerHTML = headers.map((h) => `<td>${r[h] ?? ''}</td>`).join('');
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            dataArea.appendChild(table);
        }

        init();
    </script>
</body>
</html>
