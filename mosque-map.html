<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosques I Visited</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; }
  #map { width: 100vw; height: 100vh; }

  .leaflet-popup-content-wrapper {
    background: #fcfcfc;
    color: #bb8e07;
    border: 1px solid #c9a84c;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(230, 230, 230, 0.6);
    font-family: Georgia, serif;
  }
  .leaflet-popup-tip { background: #000000; }
  .leaflet-popup-content { margin: 12px 16px; min-width: 180px; }
  .popup-name { font-size: 1rem; font-weight: bold; color: #c9a84c; margin-bottom: 6px; }
  .popup-row { font-size: 0.78rem; color: #ccc; margin: 3px 0; }
  .popup-row span { color: #f0e6c8; }
  .popup-note { font-size: 0.75rem; color: #aaa; font-style: italic; margin-top: 8px; border-top: 1px solid #333; padding-top: 6px; }
</style>
</head>
<body>
<div id="map"></div>
<script>
// ============================================================
//  PASTE YOUR GOOGLE SHEETS CSV URL BELOW
// ============================================================
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSY8Dy0kM3ZKuxJqaBncyqok5jkQp0lEPk4AyLQKSca7LOW_TjTA_Bp7Y6gB1vz_tIHjOtFPD7POnLh/pub?gid=0&single=true&output=csv_HERE";
// ============================================================

const map = L.map("map", { zoomControl: true }).setView([25, 30], 3);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: "© OpenStreetMap © CartoDB",
  maxZoom: 19
}).addTo(map);

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, "").toLowerCase());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (const c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    vals.push(cur.trim().replace(/\r/g, ""));
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/^"|"$/g, ""));
    return obj;
  }).filter(r => r.lat && r.lng && !isNaN(parseFloat(r.lat)));
}

async function loadMosques() {
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(CSV_URL)}`;
  const res = await fetch(proxy);
  const data = await res.json();
  const mosques = parseCSV(data.contents);

  mosques.forEach(m => {
    const lat = parseFloat(m.lat);
    const lng = parseFloat(m.lng);
    if (isNaN(lat) || isNaN(lng)) return;

    const dot = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: "#ccc",
      color: "#fff",
      weight: 1,
      fillOpacity: 0.9
    }).addTo(map);

    dot.bindPopup(`
      <div class="popup-name">${m.name || "Unnamed"}</div>
      ${m.city || m.country ? `<div class="popup-row">${[m.city, m.country].filter(Boolean).join(", ")}</div>` : ""}
      ${m.built    ? `<div class="popup-row">Built: <span>${m.built}</span></div>` : ""}
      ${m.visited  ? `<div class="popup-row">Visited: <span>${m.visited}</span></div>` : ""}
      ${m.category ? `<div class="popup-row">Category: <span>${m.category}</span></div>` : ""}
      ${m.note     ? `<div class="popup-note">${m.note}</div>` : ""}
    `);
  });
}

loadMosques();
</script>
</body>
</html>
